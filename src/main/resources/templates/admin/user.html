                <!-- Modal xóa người dùng -->
                <div class="modal" id="deleteUserModal" tabindex="-1" aria-labelledby="deleteUserModalLabel" aria-hidden="true">
                    <div class="modal-dialog">

                            <div class="modal-body">

                            </div>
                            <div class="modal-footer">
                                <input type="hidden" id="deleteUserId" />
                                <button type="button" class="btn btn-danger" id="confirmDeleteUser">Xóa</button>

                <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

                <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>

                <script>
                    document.getElementById("searchButton").addEventListener("click", function() {
                        const keyword = document.getElementById("searchInput").value;

                        fetch(`/admin/user/search?keyword=${keyword}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        })
                        .then(response => response.json())
                        .then(data => {
                            const tableBody = document.querySelector("table tbody");
                            tableBody.innerHTML = ""; // Xóa dữ liệu cũ
                            data.forEach(user => {
                                const row = `
                                    <tr>
                                        <td>${user.userId}</td>
                                        <td>${user.username}</td>
                                        <td>${user.role.roleName}</td>
                                        <td>
                                            <a class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#editUserModal"
                                                data-id="${user.userId}" data-username="${user.username}" data-role="${user.role.roleName}">
                                                <i class="fas fa-edit"></i> Sửa
                                            </a>
                                            <a class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteUserModal"
                                                data-id="${user.userId}">
                                                <i class="fas fa-trash"></i> Xóa
                                            </a>
                                        </td>
                                    </tr>
                                `;
                                tableBody.insertAdjacentHTML("beforeend", row);
                            });
                        })
                        .catch(error => console.error("Error:", error));
                    });


                    function setDeleteUserId(userId) {
                        console.log("userId trong hàm setDeleteUserId:", userId);  // Kiểm tra giá trị userId
                        if (userId !== undefined && userId !== null) {
                            document.getElementById('deleteUserId').value = userId;  // Gán ID vào modal
                            const deleteModal = new bootstrap.Modal(document.getElementById('deleteUserModal'));
                            deleteModal.show();  // Mở modal
                        } else {
                            console.error("Không thể gán userId vào modal:", userId);  // Log lỗi nếu userId không hợp lệ
                        }
                    }



                    $(document).on('click', '#confirmDeleteUser', function(e) {
                        var userId = $('#deleteUserId').val();  // Lấy giá trị ID từ modal
                        console.log("userId xác nhận xóa:", userId);  // Kiểm tra lại userId

                        e.preventDefault();
                        if (userId && !isNaN(userId)) {
                            $.ajax({
                                type: "DELETE",
                                url: `/admin/user/delete/${userId}`,  // Truyền đúng userId vào URL
                                success: function(response) {
                                    if (response.success) {
                                        $('#deleteSuccessMessage').text(response.message).fadeIn(500).delay(3000).fadeOut(500);
                                        $('#deleteUserModal').modal('hide');
                                        updateUserTable(response.data);  // Cập nhật lại bảng người dùng
                                    } else {
                                        $('#errorMessage').text("Đã xảy ra lỗi khi xóa người dùng!").fadeIn(500).delay(3000).fadeOut(500);
                                    }
                                },
                                error: function() {
                                    $('#errorMessage').text("Đã xảy ra lỗi khi xóa người dùng!").fadeIn(500).delay(3000).fadeOut(500);
                                }
                            });
                        } else {
                            console.error("userId không hợp lệ:", userId);
                            $('#errorMessage').text("ID người dùng không hợp lệ!").fadeIn(500).delay(3000).fadeOut(500);
                        }
                    });

                    $(document).on('click', '.btn-danger', function() {
                        var userId = $(this).data('id');  // Lấy userId từ thuộc tính data-id của nút
                        console.log("userId tại sự kiện click:", userId);  // Kiểm tra giá trị userId
                        setDeleteUserId(userId);  // Gọi hàm với userId hợp lệ
                    });



                    // Hàm cập nhật lại bảng người dùng
                    function updateUserTable(users) {
                        var tableBody = $('#userTable tbody');
                        tableBody.empty(); // Xóa bảng hiện tại

                        // Kiểm tra nếu users là một mảng hợp lệ
                        if (Array.isArray(users)) {
                            users.forEach(function(user) {
                                var row = `<tr>
                                            <td>${user.userId}</td>
                                            <td>${user.username}</td>
                                            <td>${user.email}</td>
                                            <td>
                                                <a href="#" class="btn btn-warning btn-sm" onclick="openEditUserModal(${user.userId})">
                                                    <i class="fas fa-edit"></i> Sửa
                                                </a>
                                                <a href="#" class="btn btn-danger btn-sm" onclick="setDeleteUserId(${user.userId})">
                                                    <i class="fas fa-trash"></i> Xóa
                                                </a>
                                            </td>
                                        </tr>`;
                                tableBody.append(row);
                            });
                        } else {
                            console.error("Dữ liệu người dùng không hợp lệ hoặc không phải mảng:", users);
                        }
                    }
