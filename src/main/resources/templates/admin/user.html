        <nav class="col-md-2 d-none d-md-block bg-light sidebar">
            <div class="sidebar-sticky">
                <h4>Quản Lý</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" onclick="showSection('userManagement')">

                        <a th:href="@{/admin/doctor}" class="nav-link" href="#" onclick="showSection('doctorManagement')">

                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showSection('serviceManagement')">

                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showSection('patientManagement')">
                            <i class="fas fa-procedures"></i> Quản Lý Bệnh Nhân
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showSection('statistics')">

                    </li>
                </ul>
            </div>

        <!-- Main content -->
        <main role="main" class="col-md-9 ms-sm-auto col-lg-10 px-4">
            <div id="content">
                <div class="container mt-5">
                    <h1 class="text-center">Quản Lý Người Dùng</h1>

                    <!-- Tìm kiếm bác sĩ -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <form id="searchForm" class="d-flex">
                                <input type="text" name="keyword" id="searchInput" class="form-control me-2" placeholder="Nhập từ khóa tìm kiếm..." required>
                            </form>
                        </div>
                        <div class="col-md-6 text-end">
                            <!-- Nút Tìm Kiếm gửi dữ liệu qua AJAX -->
                            <button type="submit" class="btn btn-secondary me-2" id="searchButton">Tìm Kiếm</button>
<!--                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">Thêm Người Dùng</button>-->
                        </div>
                    </div>

                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên Tài Khoản</th>
                                <th>Vai Trò</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}" th:data-id="${user.userId}">
                                <td th:text="${user.userId}"></td>
                                <td th:text="${user.username}"></td>
                                <td class="user-role" th:text="${user.role.roleName}"></td> <!-- Thêm lớp để dễ cập nhật -->
                                <td>
                                    <a class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#editUserModal"
                                       th:data-id="${user.userId}" th:data-username="${user.username}" th:data-role="${user.role.roleName}">
                                        <i class="fas fa-edit"></i> Sửa
                                    </a>
                                    <a class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteUserModal"
                                       th:data-id="${user.userId}">
                                        <i class="fas fa-trash"></i> Xóa
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            
                <!-- Modal Thêm Người Dùng -->

                <!-- Modal Chỉnh Sửa Người Dùng -->
                <div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="editUserModalLabel">Chỉnh Sửa Người Dùng</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <form id="editUserForm">
                                    <div class="mb-3">
                                        <label for="username" class="form-label">Tên Tài Khoản</label>
                                        <input type="text" class="form-control" id="username" disabled>
                                    </div>
                                    <div class="mb-3">
                                        <label for="role_name" class="form-label">Vai Trò</label>
                                        <select class="form-select" id="role_name">
                                            <option value="Admin">Admin</option>
                                            <option value="Doctor">Doctor</option>
                                            <option value="Patient">Patient</option>
                                        </select>
                                    </div>
                                    <input type="hidden" id="user_id">
                                    <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Modal Xóa Người Dùng -->
                <div class="modal fade" id="deleteUserModal" tabindex="-1" aria-labelledby="deleteUserModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="deleteUserModalLabel">Xóa Người Dùng</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <p>Bạn có chắc chắn muốn xóa người dùng này không?</p>
                            </div>
                            <div class="modal-footer">
                                <form id="deleteUserForm" action="/admin/user/delete" method="post">
                                    <input type="hidden" name="id" id="deleteUserId">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                    <button type="submit" class="btn btn-danger">Xóa</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>


                <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"></script>
                <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>

                <script>
                    document.getElementById("searchButton").addEventListener("click", function() {
                        const keyword = document.getElementById("searchInput").value;

                        fetch(`/admin/user/search?keyword=${keyword}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        })
                        .then(response => response.json())
                        .then(data => {
                            const tableBody = document.querySelector("table tbody");
                            tableBody.innerHTML = ""; // Xóa dữ liệu cũ
                            data.forEach(user => {
                                const row = `
                                    <tr>
                                        <td>${user.userId}</td>
                                        <td>${user.username}</td>
                                        <td>${user.role.roleName}</td>
                                        <td>
                                            <a class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#editUserModal"
                                                data-id="${user.userId}" data-username="${user.username}" data-role="${user.role.roleName}">
                                                <i class="fas fa-edit"></i> Sửa
                                            </a>
                                            <a class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteUserModal"
                                                data-id="${user.userId}">
                                                <i class="fas fa-trash"></i> Xóa
                                            </a>
                                        </td>
                                    </tr>
                                `;
                                tableBody.insertAdjacentHTML("beforeend", row);
                            });
                        })
                        .catch(error => console.error("Error:", error));
                    });

                    // Lắng nghe sự kiện nhấp chuột vào nút "Sửa"
                    document.querySelectorAll('[data-bs-target="#editUserModal"]').forEach(button => {
                        button.addEventListener('click', function() {
                            const userId = this.getAttribute('data-id');
                            const username = this.getAttribute('data-username');
                            const roleName = this.getAttribute('data-role');

                            openEditUserModal(userId, username, roleName); // Mở modal và điền thông tin
                        });
                    });


                    // Hàm để mở modal và điền thông tin người dùng vào form
                    function openEditUserModal(userId, username, roleName) {
                        document.getElementById('username').value = username;
                        document.getElementById('role_name').value = roleName;
                        document.getElementById('user_id').value = userId;
                    }

                    // Hàm để cập nhật vai trò trong giao diện bảng sau khi thay đổi
                    function updateUserRoleInTable(userId, newRoleName) {
                        const row = document.querySelector(`tr[data-id='${userId}']`);
                        if (row) {
                            const roleCell = row.querySelector('.user-role');
                            if (roleCell) {
                                roleCell.textContent = newRoleName; // Cập nhật vai trò mới
                            }
                        }
                    }

                    // Lắng nghe sự kiện form submit để thay đổi vai trò
                    document.getElementById('editUserForm').addEventListener('submit', function(event) {
                        event.preventDefault();

                        const userId = document.getElementById('user_id').value;
                        const newRoleName = document.getElementById('role_name').value;

                        // Giả sử bạn đã gửi yêu cầu cập nhật vai trò đến server thành công, bạn cập nhật giao diện
                        updateUserRoleInTable(userId, newRoleName);

                        // Đóng modal sau khi cập nhật
                        const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
                        modal.hide();
                    });

                    // Giả sử bạn sử dụng fetch để gửi yêu cầu cập nhật vai trò
                    document.getElementById('editUserForm').addEventListener('submit', function(event) {
                        event.preventDefault();

                        const userId = document.getElementById('user_id').value;
                        const newRoleName = document.getElementById('role_name').value;

                        // Gửi yêu cầu PATCH hoặc POST đến server để cập nhật vai trò người dùng
                        fetch(`/admin/user/edit`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                id: userId,
                                role: newRoleName
                            })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                updateUserRoleInTable(userId, newRoleName); // Cập nhật giao diện sau khi thành công
                                const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
                                modal.hide();
                            } else {
                                alert('Cập nhật vai trò không thành công');
                            }
                        })
                        .catch(error => {
                            console.error('Error:', error);
                            alert('Có lỗi xảy ra khi cập nhật');
                        });
                    });

                    // Lắng nghe sự kiện nhấp chuột vào nút "Xóa"
                    document.querySelectorAll('[data-bs-target="#deleteUserModal"]').forEach(button => {
                        button.addEventListener('click', function() {
                            const userId = this.getAttribute('data-id'); // Lấy ID người dùng từ thuộc tính data-id
                            openDeleteUserModal(userId); // Mở modal và điền ID người dùng
                        });
                    });

                    // Hàm để mở modal và điền thông tin người dùng vào form
                    function openDeleteUserModal(userId) {
                        document.getElementById('deleteUserId').value = userId;
                    }

                    // Xử lý gửi yêu cầu xóa khi nhấn nút "Xóa"
                    document.getElementById('deleteUserForm').addEventListener('submit', function(event) {
                        event.preventDefault();

                        const userId = document.getElementById('deleteUserId').value;

                        // Gửi yêu cầu DELETE đến server để xóa người dùng
                        fetch(`/admin/user/delete`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ id: userId })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                // Xử lý khi xóa thành công
                            } else {
                                alert('Có lỗi xảy ra khi xóa');
                            }
                        })
                        .catch(error => {
                            console.error('Error:', error);
                            alert('Có lỗi xảy ra khi xóa');
                        });
                    });

                    // Hàm để loại bỏ người dùng khỏi bảng
                    function removeUserFromTable(userId) {
                        const row = document.querySelector(`tr[data-id='${userId}']`);
                        if (row) {
                            row.remove(); // Loại bỏ hàng khỏi bảng
                        }
                    }


                </script>
            </div>
        </main>
    </div>
